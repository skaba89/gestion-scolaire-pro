services:
  postgres:
    image: postgres:16-alpine
    env_file: .env.docker
    # env_file sets POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD for the container
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolflow -d schoolflow"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - schoolflow-network
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    env_file: .env.docker
    command: >
      sh -c 'redis-server --requirepass "$$REDIS_PASSWORD"'
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - schoolflow-network
    mem_limit: 128m
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    env_file: .env.docker
    # MINIO_ROOT_USER and MINIO_ROOT_PASSWORD come from env_file
    environment:
      # Tell MinIO to generate presigned URLs with the public (browser-reachable) hostname.
      # Without this, presigned URLs use the internal Docker hostname "minio:9000"
      # which the browser cannot resolve.
      MINIO_SERVER_URL: "http://localhost:${MINIO_API_PORT:-9002}"
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9002}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - schoolflow-network
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # All env vars come from .env.docker — no ${VAR} substitution that would
    # accidentally pick up the local .env (which has SQLite URLs).
    env_file: .env.docker
    environment:
      # Override only the container-internal hostnames (cannot be in .env.docker
      # because they differ between host and container networking)
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
      # MinIO's root credentials double as its API access key/secret. Without
      # these, app/core/storage.py sees MINIO_ENDPOINT set but no
      # ACCESS/SECRET_KEY, so self.enabled stays False and every upload
      # silently falls back to the API container's local disk — which does
      # not survive a redeploy. Resolved via compose's own ${VAR}
      # interpolation from .env.docker (requires `--env-file .env.docker`,
      # the documented invocation — see README.md).
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      # DEBUG vient de .env.docker (via --env-file) — défaut sécurisé: false.
      # Ne JAMAIS forcer true ici: cela écrasait la valeur du fichier env.
      DEBUG: "${DEBUG:-false}"
    ports:
      - "${API_PORT:-8000}:8000"
    command: ["bash", "/app/start.sh"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; r=urllib.request.urlopen('http://localhost:8000/health/ready'); sys.exit(0 if r.status==200 else 1)\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - schoolflow-network
    mem_limit: 512m

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Always /api for Docker — nginx proxies /api/ → http://api:8000/
        # The root .env VITE_API_URL=http://localhost:8000 is only for local npm dev server.
        VITE_API_URL: /api
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - schoolflow-network
    mem_limit: 128m

  db-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    restart: always
    env_file: .env.docker
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./infra/backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - schoolflow-network

volumes:
  pg_data:
  redis_data:
  minio_data:

networks:
  schoolflow-network:
    driver: bridge
