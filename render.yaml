# =============================================================================
# SchoolFlow Pro — Render Blueprint (render.yaml)
# =============================================================================
# Deploy to Render with:  render blueprint apply
# Documentation: https://render.com/docs/blueprint-spec
# =============================================================================
#
# ARCHITECTURE on Render:
#   - Frontend (server.mjs) → proxies /api/* to Backend
#   - Backend (FastAPI) → PostgreSQL + optional Redis
#   - VITE_API_URL is resolved via fromService (backend hostname)
#   - server.mjs auto-generates config.js with /api as API_URL
#     and proxies all /api/* requests to the backend
#
# =============================================================================

databases:
  # ─── PostgreSQL (Render Managed) ─────────────────────────────────────────
  - name: schoolflow-db
    databaseName: schoolflow
    region: frankfurt
    plan: starter

services:
  # ─── Backend API (FastAPI) ───────────────────────────────────────────────
  - type: web
    name: schoolflow-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    rootDir: ./backend
    envVars:
      # --- Database (auto-linked par Render) ---
      - key: DATABASE_URL
        fromDatabase:
          name: schoolflow-db
          property: connectionString
      - key: DATABASE_URL_ASYNC
        fromDatabase:
          name: schoolflow-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: schoolflow-db
          property: connectionString

      # --- Application ---
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"

      # --- Admin (CHANGEZ ce mot de passe apres le 1er login!) ---
      - key: ADMIN_DEFAULT_EMAIL
        value: admin@schoolflow.local
      - key: ADMIN_DEFAULT_PASSWORD
        value: "Admin@123456"
      # --- Security ---
      - key: BOOTSTRAP_SECRET
        generateValue: true
      - key: METRICS_SECRET
        generateValue: true

      # --- CORS: allow both the frontend domain and wildcard for Render ---
      # The frontend proxy (server.mjs) sends requests server-side, so CORS
      # is only needed for direct browser-to-backend calls.
      - key: BACKEND_CORS_ORIGINS
        fromService:
          name: gestion-scolaire-pro
          type: web
          property: host

      # --- Redis (optionnel — rate limiting / sessions sans Redis = mode degraded) ---
      - key: REDIS_URL
        sync: false

      # --- AI (optionnel) ---
      - key: GROQ_API_KEY
        sync: false

  # ─── Frontend (React SPA with built-in API proxy) ──────────────────────────
  # Uses server.mjs which:
  #   1. Serves static files from dist/
  #   2. Proxies /api/* and /api-proxy/* to the backend (no CORS needed!)
  #   3. Falls back to index.html for SPA routing
  #   4. Auto-generates dist/config.js with API_URL=/api at startup
  #
  # IMPORTANT: VITE_API_URL is set to the backend hostname via fromService.
  # server.mjs resolves this and uses it as the proxy target. The frontend
  # runtime config will use /api (relative path) so all API calls go through
  # the built-in proxy, avoiding CORS issues entirely.
  - type: web
    name: gestion-scolaire-pro
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.mjs
    rootDir: .
    envVars:
      - key: NODE_ENV
        value: production
      # --- Backend URL for the proxy (resolved at runtime by server.mjs) ---
      # fromService.host gives the bare hostname (e.g. schoolflow-api-xxxx.onrender.com)
      # server.mjs prepends https:// and uses it as the proxy target
      - key: VITE_API_URL
        fromService:
          name: schoolflow-api
          type: web
          property: host
