# =============================================================================
# SchoolFlow Pro — Render Blueprint (render.yaml)
# =============================================================================
# Deploy to Render with:  render blueprint apply
# Documentation: https://render.com/docs/blueprint-spec
# =============================================================================
#
# ARCHITECTURE on Render:
#   - schoolflow-db   (PostgreSQL) — managed database
#   - schoolflow-api  (FastAPI)    — backend API
#   - gestion-scolaire-pro (Node)  — frontend SPA + API proxy
#
# The frontend proxies /api/* to the backend, so the browser only talks
# to one domain. No CORS issues.
#
# =============================================================================

databases:
  # ─── PostgreSQL (Render Managed) ─────────────────────────────────────────
  - name: schoolflow-db
    databaseName: schoolflow
    region: frankfurt
    plan: starter

services:
  # ─── Backend API (FastAPI) ───────────────────────────────────────────────
  - type: web
    name: schoolflow-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    # NOTE: Do NOT run "alembic upgrade head" here — alembic.ini has an empty
    # sqlalchemy.url, so it would fail and block uvicorn via &&.
    # The app's lifespan handler in main.py runs migrations automatically
    # with the correct DATABASE_URL.
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: ./backend
    envVars:
      # --- Database (auto-linked by Render from schoolflow-db) ---
      - key: DATABASE_URL
        fromDatabase:
          name: schoolflow-db
          property: connectionString
      - key: DATABASE_URL_ASYNC
        fromDatabase:
          name: schoolflow-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: schoolflow-db
          property: connectionString

      # --- Application ---
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"

      # --- Admin (CHANGEZ ce mot de passe apres le 1er login!) ---
      - key: ADMIN_DEFAULT_EMAIL
        value: admin@schoolflow.local
      - key: ADMIN_DEFAULT_PASSWORD
        value: "Admin@123456"

      # --- Security ---
      - key: BOOTSTRAP_SECRET
        generateValue: true
      - key: METRICS_SECRET
        generateValue: true

      # --- CORS ---
      - key: BACKEND_CORS_ORIGINS
        fromService:
          name: gestion-scolaire-pro
          type: web
          property: host

      # --- Redis (optionnel) ---
      - key: REDIS_URL
        sync: false

      # --- AI (optionnel) ---
      - key: GROQ_API_KEY
        sync: false

  # ─── Frontend (React SPA + API proxy via server.mjs) ─────────────────────
  - type: web
    name: gestion-scolaire-pro
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.mjs
    rootDir: .
    envVars:
      - key: NODE_ENV
        value: production
      # VITE_API_URL = backend hostname (resolved by Render via fromService).
      # server.mjs prepends https:// and uses it as the proxy target.
      - key: VITE_API_URL
        fromService:
          name: schoolflow-api
          type: web
          property: host
