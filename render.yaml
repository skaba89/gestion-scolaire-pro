# =============================================================================
# SchoolFlow Pro — Render Blueprint (render.yaml)
# =============================================================================
# Deploy to Render with:  render blueprint apply
# Documentation: https://render.com/docs/blueprint-spec
# =============================================================================
#
# ARCHITECTURE:
#   - Neon           (PostgreSQL) — external managed database, NOT provisioned
#                      by this blueprint. Create it at console.neon.tech and
#                      paste the pooled connection string into DATABASE_URL
#                      on the schoolflow-api service in the Render dashboard
#                      (env vars marked "sync: false" are not set here).
#   - schoolflow-api  (FastAPI)    — backend API, on Render
#   - gestion-scolaire-pro (Node)  — frontend SPA + API proxy, on Render
#
# The frontend proxies /api/* to the backend, so the browser only talks
# to one domain. No CORS issues.
#
# Why Neon instead of Render's managed Postgres: Neon's free tier has no
# 90-day expiry (Render's free Postgres does) and includes branching, which
# is convenient for testing migrations against a copy of production data.
#
# =============================================================================

services:
  # ─── Redis (token versioning, session mutex) ─────────────────────────────
  - type: redis
    name: schoolflow-redis
    region: frankfurt
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ─── Backend API (FastAPI) ───────────────────────────────────────────────
  - type: web
    name: schoolflow-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    # NOTE: Do NOT run "alembic upgrade head" here — alembic.ini has an empty
    # sqlalchemy.url, so it would fail and block uvicorn via &&.
    # The app's lifespan handler in main.py runs migrations automatically
    # with the correct DATABASE_URL.
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: ./backend
    envVars:
      # --- Database (Neon — set manually in the Render dashboard) ---
      # Use the POOLED connection string from Neon (the one with
      # "-pooler" in the hostname) so the app doesn't exhaust Neon's
      # direct connection limit under load. Neon's string already
      # includes "?sslmode=require", which the backend detects
      # automatically (see backend/app/core/database.py).
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_ASYNC
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false

      # --- Application ---
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"

      # --- Admin (CHANGEZ ce mot de passe apres le 1er login!) ---
      - key: ADMIN_DEFAULT_EMAIL
        value: admin@schoolflow.local
      - key: ADMIN_DEFAULT_PASSWORD
        generateValue: true  # Secure auto-generated password — check Render dashboard after deploy

      # --- Security ---
      - key: BOOTSTRAP_SECRET
        generateValue: true
      - key: METRICS_SECRET
        generateValue: true
      # Set to true after the first SUPER_ADMIN has logged in and enrolled
      # MFA — left true here would lock that very first login out, since no
      # account can have MFA configured before it exists.
      - key: ENFORCE_MFA
        value: "false"

      # --- CORS ---
      - key: BACKEND_CORS_ORIGINS
        fromService:
          name: gestion-scolaire-pro
          type: web
          property: host

      # --- Frontend URL (used to build links in transactional emails) ---
      # Render's "fromService: property: host" only returns the bare
      # hostname (no scheme), but this value is concatenated directly as
      # "{FRONTEND_URL}/..." in email links (see account_provisioning.py) —
      # so it must be the FULL URL including "https://". Set manually after
      # the first deploy once you know the frontend's Render/custom domain.
      - key: FRONTEND_URL
        sync: false

      # --- Email (Resend recommandé, gratuit jusqu'à 3000/mois — resend.com) ---
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@schoolflow.pro

      # --- Redis (token versioning, session mutex) ---
      - key: REDIS_URL
        fromService:
          name: schoolflow-redis
          type: redis
          property: connectionString

      # --- AI (optionnel) ---
      - key: GROQ_API_KEY
        sync: false

  # ─── Frontend (React SPA + API proxy via server.mjs) ─────────────────────
  - type: web
    name: gestion-scolaire-pro
    runtime: node
    region: frankfurt
    plan: free
    # NOTE: --include=dev is required because NODE_ENV=production (set below)
    # causes npm to skip devDependencies. vite and plugins are in devDeps.
    buildCommand: npm install --include=dev && npm run build
    startCommand: node server.mjs
    rootDir: .
    envVars:
      - key: NODE_ENV
        value: production
      # VITE_API_URL = backend hostname (resolved by Render via fromService).
      # server.mjs prepends https:// and uses it as the proxy target.
      - key: VITE_API_URL
        fromService:
          name: schoolflow-api
          type: web
          property: host
