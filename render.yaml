services:
  - type: web
    name: schoolflow-frontend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    autoDeployTrigger: checksPass
    healthCheckPath: /health
    envVars:
      - key: VITE_API_URL
        value: /api-proxy
      - key: VITE_KEYCLOAK_URL
        value: /keycloak
      - key: VITE_KEYCLOAK_REALM
        value: schoolflow
      - key: VITE_KEYCLOAK_CLIENT_ID
        value: schoolflow-frontend
      - key: VITE_ENABLE_BOOTSTRAP_DEBUG
        value: "false"
      - key: VITE_ENABLE_AUTH_DEBUG
        value: "false"
      - key: API_PUBLIC_BASE_URL
        sync: false
      - key: KEYCLOAK_PUBLIC_BASE_URL
        sync: false

  - type: web
    name: schoolflow-api
    runtime: python
    rootDir: backend
    plan: free
    autoDeployTrigger: checksPass
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        fromDatabase:
          name: schoolflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "True"
      - key: LOG_LEVEL
        value: INFO
      - key: KEYCLOAK_EXTERNAL_HOSTNAME
        sync: false
      - key: KEYCLOAK_REALM
        value: schoolflow
      - key: KEYCLOAK_CLIENT_ID
        value: schoolflow-frontend
      - key: KEYCLOAK_CLIENT_SECRET
        value: ""
      - key: KEYCLOAK_AUDIENCE
        value: schoolflow-frontend
      - key: REDIS_URL
        fromService:
          name: schoolflow-redis
          type: keyvalue
          property: connectionString
      - key: MINIO_EXTERNAL_HOSTNAME
        sync: false
      - key: MINIO_ACCESS_KEY
        fromService:
          name: schoolflow-minio
          type: web
          envVarKey: MINIO_ROOT_USER
      - key: MINIO_SECRET_KEY
        fromService:
          name: schoolflow-minio
          type: web
          envVarKey: MINIO_ROOT_PASSWORD
      - key: MINIO_BUCKET
        value: schoolflow

  - type: web
    name: schoolflow-keycloak
    runtime: image
    plan: free
    image:
      url: quay.io/keycloak/keycloak:26.0
    dockerCommand: /opt/keycloak/bin/kc.sh start-dev --http-port 10000 --hostname-strict=false --proxy-headers=xforwarded --http-relative-path=/keycloak
    healthCheckPath: /keycloak/realms/master
    envVars:
      - key: KC_BOOTSTRAP_ADMIN_USERNAME
        value: admin
      - key: KC_BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: KC_HTTP_RELATIVE_PATH
        value: /keycloak
      - key: KC_PROXY_HEADERS
        value: xforwarded

  - type: web
    name: schoolflow-minio
    runtime: image
    plan: free
    image:
      url: minio/minio:RELEASE.2024-11-07T00-52-20Z
    dockerCommand: minio server /data --address :10000 --console-address :10001
    healthCheckPath: /minio/health/live
    envVars:
      - key: MINIO_ROOT_USER
        value: minioadmin
      - key: MINIO_ROOT_PASSWORD
        generateValue: true

  - type: keyvalue
    name: schoolflow-redis
    plan: free
    ipAllowList: []


databases:
  - name: schoolflow-db
    plan: free
    databaseName: schoolflow
    user: schoolflow
    postgresMajorVersion: "18"
