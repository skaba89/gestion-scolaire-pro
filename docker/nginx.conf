server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed brotli/gzip files generated at build time
    gzip_static on;
    brotli_static on;

    # Dynamic gzip fallback for responses without pre-compressed files
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/wasm;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Cache hashed static assets aggressively (immutable content-addressed files)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html and config.js must NEVER be cached — they reference hashed assets
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    location = /config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Service workers must never be cached
    location ~ ^/sw.*\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend.
    # IMPORTANT: trailing slash on proxy_pass strips the /api/ prefix so that
    # /api/api/v1/... (produced by VITE_API_URL=/api + baseURL=/api/v1) becomes
    # http://api:8000/api/v1/... correctly.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Disable upstream compression — let Nginx handle it
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Proxy /api-proxy/ to backend (used when VITE_API_URL=/api-proxy)
    location /api-proxy/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Disable upstream compression — let Nginx handle it
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Serve uploaded files from backend (local storage fallback)
    location /uploads/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Disable upstream compression — let Nginx handle it
        proxy_set_header Accept-Encoding "";
    }

    # Proxy MinIO presigned URL requests.
    # IMPORTANT: We must forward Host=minio:9000 so MinIO signature validation passes.
    # The presigned URL was signed with "minio:9000" as the host; any other Host value
    # would fail signature verification.
    # Uses resolver + variable so nginx starts even when minio is not running.
    location /minio-proxy/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $minio_upstream http://minio:9000/;
        proxy_pass $minio_upstream;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept-Encoding "";
        # Allow cross-origin image loading
        add_header Access-Control-Allow-Origin "*";
        # Cache MinIO files aggressively (presigned URLs are content-addressed)
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
