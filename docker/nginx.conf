# ─── Redirection HTTP → HTTPS (décommenter en production avec TLS) ─────────────
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Compression Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/x-component
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        application/wasm
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        font/woff
        font/woff2
        image/svg+xml
        image/x-icon;

    # ─── En-têtes de sécurité ─────────────────────────────────────────────────
    # X-Frame-Options : DENY empêche tout framing (plus strict que SAMEORIGIN pour une SPA)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy
    # Adapter connect-src selon les domaines API réels en production
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        img-src 'self' data: blob: https:;
        font-src 'self' data: https://fonts.gstatic.com;
        connect-src 'self' https:;
        media-src 'self' blob:;
        worker-src 'self' blob:;
        frame-src 'none';
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    # Permissions Policy — restrict to only what the app needs
    add_header Permissions-Policy "
        geolocation=(),
        camera=(),
        microphone=(),
        payment=(),
        usb=(),
        bluetooth=(),
        midi=(),
        clipboard-write=(self)
    " always;

    # HSTS — Enforce HTTPS (uncomment only when TLS termination is in place)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ─── Assets statiques (cache long terme) ──────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ─── Health check (sans logs) ─────────────────────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type "text/plain";
        return 200 "healthy\n";
    }

    # ─── Fichiers cachés (ex: .git, .env) — interdits ────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── SPA routing — toutes les routes → index.html ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
