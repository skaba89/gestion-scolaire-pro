# =============================================================================
# SchoolFlow Pro — Netlify Deployment Configuration
# =============================================================================
# IMPORTANT — AVANT DE DÉPLOYER :
#   Remplacer l'URL backend (chercher SCHOOLFLOW_API_URL ci-dessous)
#   Exemple : https://schoolflow-api-xxxx.onrender.com
#
# Variables à définir dans Netlify Dashboard → Site settings → Env vars :
#   VITE_ENABLE_PWA         = true
#   VITE_SENTRY_DSN         = (optionnel)
#   VITE_SENTRY_ENVIRONMENT = production
# =============================================================================

[build]
  # Le script génère dist/_redirects avec les vraies URLs depuis VITE_API_URL
  # Variables à définir dans Netlify Dashboard → Site settings → Env vars :
  #   VITE_API_URL = https://schoolflow-api-xxxx.onrender.com   ← OBLIGATOIRE
  command = "npm run build && node scripts/generate-redirects.mjs"
  publish = "dist"

# ─── SPA Routing ─────────────────────────────────────────────────────────────
# Fallback minimal — les règles API proxy sont injectées dans dist/_redirects
# par generate-redirects.mjs au moment du build (elles passent AVANT ce catch-all).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Security Headers ───────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ─── Cache: Static assets (noms hachés → immuables 1 an) ───────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Cache: Service Worker (pas de cache — toujours frais) ─────────────────
[[headers]]
  for = "/sw-schoolflow.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ─── Cache: HTML (toujours revalider) ──────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ─── Cache: config.js runtime (ne jamais mettre en cache) ──────────────────
[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
