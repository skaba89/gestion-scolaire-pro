name: CI

on:
  push:
    branches: [main, develop, "feature/**", "chore/**", "fix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight repository checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail on committed merge markers
        run: |
          if grep -R -n -E '^(<<<<<<<|=======|>>>>>>>)' . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=dev-dist; then
            echo "Merge conflict markers detected in tracked files."
            exit 1
          fi

  frontend:
    name: Frontend quality gate
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

  backend:
    name: Backend quality gate
    runs-on: ubuntu-latest
    needs: preflight
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      DATABASE_URL_ASYNC: postgresql+asyncpg://testuser:testpass@localhost:5432/testdb
      DATABASE_URL_SYNC: postgresql+psycopg2://testuser:testpass@localhost:5432/testdb
      SECRET_KEY: ci-secret-key-change-me-in-real-env-1234567890
      DEBUG: "False"
      LOG_LEVEL: INFO
      REDIS_URL: redis://localhost:6379/0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  docker:
    name: Docker validation
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare docker env
        run: cp .env.docker.example .env.docker

      - name: Validate docker compose
        run: docker compose --env-file .env.docker config

      - name: Build frontend image
        run: docker build -t schoolflow-frontend:ci .

      - name: Build backend image
        run: docker build -t schoolflow-backend:ci ./backend

