# =============================================================================
# SchoolFlow Pro — Continuous Integration
# =============================================================================
# Runs on push to main and pull_request to main.
# Two independent jobs: frontend (Node 20) and backend (Python 3.11).
# Designed to complete in under 5 minutes.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend: lint + build ────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint (ESLint)
        run: npm run lint --max-warnings 50
        continue-on-error: true

      - name: Build (Vite)
        run: npm run build
        env:
          CI: true

  # ── Backend: syntax + import validation ────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Validate Python syntax
        run: |
          python -m py_compile backend/app/main.py && echo "main.py OK"
          python -m py_compile backend/app/core/config.py && echo "config.py OK"
          python -m py_compile backend/app/core/security.py && echo "security.py OK"
          python -m py_compile backend/app/core/database.py && echo "database.py OK"

      - name: Validate imports
        run: python -c "from backend.app.main import app; print('All imports OK')" || true
