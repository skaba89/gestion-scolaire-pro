# =============================================================================
# SchoolFlow Pro — Continuous Integration Pipeline
# =============================================================================
# Runs on push to main and pull_request to main.
# Four independent jobs: frontend (lint+typecheck+build), backend (syntax+security+pytest),
# backend-tests (PostgreSQL integration), and security (dependency + secret scanning).
# Designed to complete in under 5 minutes.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend: lint + type-check + build ─────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint (ESLint)
        run: npm run lint --max-warnings 30

      - name: Type-check (TypeScript)
        run: npm run type-check

      - name: Build (Vite)
        run: npm run build
        env:
          CI: true

  # ── Backend: syntax + import + security validation ───────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Validate Python syntax (all app files)
        run: |
          ERRORS=0
          for f in $(find backend/app -name "*.py"); do
            if ! python -m py_compile "$f" 2>/dev/null; then
              echo "FAIL: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          echo "Checked all Python files. Errors: $ERRORS"
          exit $ERRORS

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets in backend..."
          SECRETS_FOUND=0
          # Check for common secret patterns in Python files
          if rg -l 'password\s*=\s*["\x27][^"\x27]{4,}["\x27]' backend/app/ --type py 2>/dev/null; then
            echo "WARNING: Possible hardcoded password found"
            SECRETS_FOUND=1
          fi
          if rg -l 'SECRET.*=\s*["\x27][^"\x27]{8,}["\x27]' backend/app/ --type py 2>/dev/null; then
            echo "WARNING: Possible hardcoded secret found"
            SECRETS_FOUND=1
          fi
          if [ $SECRETS_FOUND -eq 0 ]; then
            echo "No hardcoded secrets detected"
          fi

      - name: Check for dangerous patterns
        run: |
          echo "Scanning for dangerous patterns..."
          # eval() usage
          if rg -l '\beval\s*\(' backend/app/ --type py 2>/dev/null; then
            echo "WARNING: eval() found in backend code"
          fi
          # exec() usage with user input risk
          if rg -l '\bexec\s*\(' backend/app/ --type py 2>/dev/null; then
            echo "WARNING: exec() found in backend code"
          fi
          # pickle deserialization
          if rg -l 'pickle\.load' backend/app/ --type py 2>/dev/null; then
            echo "WARNING: pickle.load (insecure deserialization) found"
          fi
          # subprocess shell=True
          if rg -l 'shell\s*=\s*True' backend/app/ --type py 2>/dev/null; then
            echo "WARNING: subprocess with shell=True found"
          fi

      - name: Run backend tests (SQLite)
        run: cd backend && python -m pytest tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite:///./test.db
          DEBUG: "true"
          SECRET_KEY: test-secret-key-for-ci-min-32-chars
          BOOTSTRAP_SECRET: test-bootstrap-secret-key-for-ci-32chars

  # ── Backend Tests: PostgreSQL integration ──────────────────────────────
  backend-tests:
    name: Backend Tests (PostgreSQL)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start PostgreSQL service
        run: |
          docker compose -f docker-compose.yml up postgres -d --wait
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: schoolflow_test
          POSTGRES_USER: schoolflow

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.yml exec -T postgres pg_isready -U schoolflow -d schoolflow_test > /dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests (PostgreSQL)
        run: cd backend && python -m pytest tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql://schoolflow:testpassword@localhost:5432/schoolflow_test
          SECRET_KEY: test-secret-key-for-ci-min-32-chars
          BOOTSTRAP_SECRET: test-bootstrap-secret-key-for-ci-32chars

      - name: Stop PostgreSQL service
        if: always()
        run: docker compose -f docker-compose.yml down -v

  # ── Security: dependency vulnerability scan ─────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        run: |
          npm audit --audit-level=high --json > audit-results.json 2>&1 || true
          # Fail if HIGH or CRITICAL vulnerabilities found
          HIGH_COUNT=$(python3 -c "import json; d=json.load(open('audit-results.json')); print(sum(1 for v in d.get('vulnerabilities',{}).values() if v.get('severity') in ('high','critical'))" 2>/dev/null || echo 0)
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "::error::$HIGH_COUNT high/critical npm vulnerabilities found"
            npm audit --audit-level=high
            exit 1
          fi
          echo "No high/critical vulnerabilities"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit on backend
        run: |
          pip-audit -r backend/requirements.txt --desc 2>&1 | tee pip-audit-results.txt
          if grep -E "^\[\]\s+(vulnerable|unsuitable)" pip-audit-results.txt; then
            echo "::error::Vulnerable Python dependencies found"
            exit 1
          fi

      - name: Check for .env files in git
        run: |
          echo "Checking for committed .env files..."
          ENV_FILES=$(git ls-files | grep -E '\.env$|\.env\.' | grep -v '.env.example' | grep -v '.env.docker.example' | grep -v '.env.production.template' || true)
          if [ -n "$ENV_FILES" ]; then
            echo "ERROR: .env files committed to git:"
            echo "$ENV_FILES"
            exit 1
          else
            echo "No .env files committed to git"
          fi

      - name: Check for credential files
        run: |
          echo "Checking for committed credential files..."
          CRED_FILES=$(git ls-files | grep -iE 'credentials|password|secret.*\.txt|\.pem$|\.key$' || true)
          if [ -n "$CRED_FILES" ]; then
            echo "ERROR: Possible credential files committed:"
            echo "$CRED_FILES"
            exit 1
          else
            echo "No credential files committed to git"
          fi
