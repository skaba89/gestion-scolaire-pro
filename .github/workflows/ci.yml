# =============================================================================
# SchoolFlow Pro — Continuous Integration Pipeline
# =============================================================================
# Runs on push to main and pull_request to main.
# Five independent jobs: frontend (lint+typecheck+build), browser smoke (Playwright),
# backend (syntax+security+pytest), backend-tests (PostgreSQL integration),
# and security (dependency + secret scanning).
# Designed to complete in under 5 minutes.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint (ESLint)
        run: npm run lint -- --max-warnings 2182
        # Progressive debt budget: current baseline is 2182 warnings.
        # Any increase fails CI; dedicated cleanup PRs will ratchet this down.

      - name: Type-check (TypeScript)
        run: npm run type-check

      - name: Run stable frontend test baseline with coverage
        # Auto-discover every Vitest suite so new unit tests enter the gate by default.
        # Playwright end-to-end suites remain isolated by vitest.config.ts.
        run: npm run test -- --run --coverage --reporter=verbose
        env:
          CI: true

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 7

      - name: Build (Vite)
        run: npm run build
        env:
          CI: true

  browser-smoke:
    name: Browser Smoke (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run critical browser smoke tests
        run: npm run test:e2e:smoke
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 7

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Validate Alembic migrations (no multiple heads)
        run: |
          cd backend
          HEADS=$(python -c "
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          cfg = Config('alembic.ini')
          script = ScriptDirectory.from_config(cfg)
          heads = script.get_heads()
          print(len(heads))
          for h in heads: print(f'  head: {h}')
          ")
          echo "Migration heads: $HEADS"
          HEAD_COUNT=$(echo "$HEADS" | head -1)
          if [ "$HEAD_COUNT" -gt 1 ]; then
            echo "::error::Multiple Alembic migration heads detected — merge required"
            exit 1
          fi
          echo "Migration chain OK (single head)"

      - name: Validate Python syntax (all app files)
        run: |
          ERRORS=0
          for f in $(find backend/app -name "*.py"); do
            if ! python -m py_compile "$f" 2>/dev/null; then
              echo "FAIL: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          echo "Checked all Python files. Errors: $ERRORS"
          exit $ERRORS

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets in backend..."
          SECRETS_FOUND=0
          if rg -l 'password\s*=\s*["\x27][^"\x27]{4,}["\x27]' backend/app/ --type py 2>/dev/null; then
            echo "WARNING: Possible hardcoded password found"
            SECRETS_FOUND=1
          fi
          if rg -l 'SECRET.*=\s*["\x27][^"\x27]{8,}["\x27]' backend/app/ --type py 2>/dev/null; then
            echo "WARNING: Possible hardcoded secret found"
            SECRETS_FOUND=1
          fi
          if [ $SECRETS_FOUND -eq 0 ]; then
            echo "No hardcoded secrets detected"
          fi

      - name: Check for dangerous patterns
        run: |
          echo "Scanning for dangerous patterns..."
          if rg -l '\beval\s*\(' backend/app/ --type py 2>/dev/null; then
            echo "WARNING: eval() found in backend code"
          fi
          if rg -l '\bexec\s*\(' backend/app/ --type py 2>/dev/null; then
            echo "WARNING: exec() found in backend code"
          fi
          if rg -l 'pickle\.load' backend/app/ --type py 2>/dev/null; then
            echo "WARNING: pickle.load (insecure deserialization) found"
          fi
          if rg -l 'shell\s*=\s*True' backend/app/ --type py 2>/dev/null; then
            echo "WARNING: subprocess with shell=True found"
          fi

      - name: Install coverage tools
        run: pip install pytest-cov

      - name: Run backend tests (SQLite) with coverage
        run: |
          cd backend && python -m pytest tests/ -v --tb=short \
            --cov=app --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=37
        env:
          DATABASE_URL: sqlite:///./test.db
          DATABASE_URL_SYNC: sqlite:///./test.db
          DATABASE_URL_ASYNC: sqlite+aiosqlite:///./test.db
          DEBUG: "true"
          SECRET_KEY: test-secret-key-for-ci-min-32-chars
          BOOTSTRAP_SECRET: test-bootstrap-secret-key-for-ci-32chars

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-sqlite
          path: backend/coverage.xml
          retention-days: 7

  backend-tests:
    name: Backend Tests (PostgreSQL)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker CI environment
        run: |
          cat > .env.docker.ci <<'EOF'
          POSTGRES_DB=schoolflow_test
          POSTGRES_USER=schoolflow
          POSTGRES_PASSWORD=testpassword
          POSTGRES_PORT=5432
          REDIS_PASSWORD=testredispassword
          REDIS_PORT=6379
          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=testminio123
          MINIO_BUCKET=schoolflow
          MINIO_API_PORT=9002
          MINIO_CONSOLE_PORT=9001
          SECRET_KEY=test-secret-key-for-ci-min-32-chars
          BOOTSTRAP_SECRET=test-bootstrap-secret-key-for-ci-32chars
          ADMIN_DEFAULT_EMAIL=admin@schoolflow.local
          ADMIN_DEFAULT_PASSWORD=testpassword123
          API_PORT=8000
          FRONTEND_PORT=3000
          VITE_API_URL=/api
          DEBUG=true
          LOG_LEVEL=INFO
          BACKEND_CORS_ORIGINS=http://localhost:3000
          GROQ_API_KEY=
          GROQ_MODEL=llama-3.3-70b-versatile
          GROQ_MAX_TOKENS=4096
          BACKUP_SCHEDULE=@daily
          BACKUP_KEEP_DAYS=7
          BACKUP_KEEP_WEEKS=4
          BACKUP_KEEP_MONTHS=6
          EOF
          sed -i 's/^          //' .env.docker.ci
          # docker-compose.yml references .env.docker through service env_file.
          # Keep --env-file for Compose interpolation and provide the referenced file.
          cp .env.docker.ci .env.docker

      - name: Validate docker compose config
        run: docker compose --env-file .env.docker.ci -f docker-compose.yml config >/tmp/compose.yml

      - name: Start PostgreSQL service
        run: docker compose --env-file .env.docker.ci -f docker-compose.yml up postgres -d --wait

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in $(seq 1 30); do
            if docker compose --env-file .env.docker.ci -f docker-compose.yml exec -T postgres pg_isready -U schoolflow -d schoolflow_test > /dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Apply PostgreSQL migrations
        run: cd backend && alembic upgrade head
        env:
          DATABASE_URL: postgresql://schoolflow:testpassword@localhost:5432/schoolflow_test
          DATABASE_URL_SYNC: postgresql+psycopg://schoolflow:testpassword@localhost:5432/schoolflow_test
          DATABASE_URL_ASYNC: postgresql+psycopg://schoolflow:testpassword@localhost:5432/schoolflow_test
          DEBUG: "true"
          SECRET_KEY: test-secret-key-for-ci-min-32-chars
          BOOTSTRAP_SECRET: test-bootstrap-secret-key-for-ci-32chars

      - name: Validate production readiness RLS invariant
        run: |
          cd backend
          python - <<'PY'
          from app.main import _check_database_and_rls

          status = _check_database_and_rls()
          if status != ("connected", "active"):
              raise SystemExit(f"PostgreSQL readiness invariant failed: {status}")
          print("PostgreSQL tenant RLS readiness invariant is active")
          PY
        env:
          DATABASE_URL: postgresql://schoolflow:testpassword@localhost:5432/schoolflow_test
          DATABASE_URL_SYNC: postgresql+psycopg://schoolflow:testpassword@localhost:5432/schoolflow_test
          DATABASE_URL_ASYNC: postgresql+psycopg://schoolflow:testpassword@localhost:5432/schoolflow_test
          REDIS_URL: redis://localhost:6379/0
          DEBUG: "true"

      - name: Validate backup and restore drill against PostgreSQL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
          BACKUP_DIR="$(mktemp -d)"
          export BACKUP_DIR
          export DB_HOST=localhost
          export DB_PORT=5432
          export DB_NAME=schoolflow_test
          export DB_USER=schoolflow
          export DB_PASSWORD=testpassword
          export MIN_FREE_SPACE_MB=0
          export RETENTION_DAYS=1

          cleanup() {
            PGPASSWORD="$DB_PASSWORD" dropdb \
              -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" \
              --if-exists schoolflow_restore_drill >/dev/null 2>&1 || true
            rm -rf "$BACKUP_DIR"
          }
          trap cleanup EXIT

          scripts/backup-database.sh
          BACKUP_FILE="$(find "$BACKUP_DIR" -maxdepth 1 -name 'schoolflow_backup_*.dump' -type f -print -quit)"
          test -n "$BACKUP_FILE"
          scripts/restore-database.sh --backup "$BACKUP_FILE"

          PGPASSWORD="$DB_PASSWORD" createdb \
            -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" \
            schoolflow_restore_drill
          scripts/restore-database.sh \
            --backup "$BACKUP_FILE" \
            --target-db schoolflow_restore_drill \
            --execute \
            --confirm schoolflow_restore_drill
          PGPASSWORD="$DB_PASSWORD" psql \
            -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" \
            -d schoolflow_restore_drill -v ON_ERROR_STOP=1 \
            -c "SELECT count(*) FROM alembic_version;"

      - name: Install coverage tools
        run: pip install pytest-cov

      - name: Run backend tests (PostgreSQL) with coverage
        run: |
          cd backend && python -m pytest tests/ -v --tb=short \
            --cov=app --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=37
        env:
          DATABASE_URL: postgresql://schoolflow:testpassword@localhost:5432/schoolflow_test
          DATABASE_URL_SYNC: postgresql+psycopg://schoolflow:testpassword@localhost:5432/schoolflow_test
          DATABASE_URL_ASYNC: postgresql+psycopg://schoolflow:testpassword@localhost:5432/schoolflow_test
          DEBUG: "true"
          SECRET_KEY: test-secret-key-for-ci-min-32-chars
          BOOTSTRAP_SECRET: test-bootstrap-secret-key-for-ci-32chars

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-postgres
          path: backend/coverage.xml
          retention-days: 7

      - name: Stop PostgreSQL service
        if: always()
        run: docker compose --env-file .env.docker.ci -f docker-compose.yml down -v

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        run: |
          npm audit --audit-level=high --json > audit-results.json 2>&1 || true
          HIGH_COUNT=$(python3 -c "import json; d=json.load(open('audit-results.json')); print(sum(1 for v in d.get('vulnerabilities',{}).values() if v.get('severity') in ('high','critical'))" 2>/dev/null || echo 0)
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "::error::$HIGH_COUNT high/critical npm vulnerabilities found"
            npm audit --audit-level=high
            exit 1
          fi
          echo "No high/critical vulnerabilities"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit on backend
        run: pip-audit -r backend/requirements.txt --desc

      - name: Check for .env files in git
        run: |
          echo "Checking for committed .env files..."
          ENV_FILES=$(git ls-files | grep -E '(^|/)\.env($|\.)' | grep -Ev '(\.example|\.template)(\.clean)?$' || true)
          if [ -n "$ENV_FILES" ]; then
            echo "ERROR: .env files committed to git:"
            echo "$ENV_FILES"
            exit 1
          else
            echo "No .env files committed to git"
          fi

      - name: Check for credential files
        run: |
          echo "Checking for committed credential files..."
          CRED_FILES=$(git ls-files | grep -iE '(^|/)(credentials(\.[^/]*)?|secret[^/]*\.txt)$|(\.pem|\.key)$' || true)
          if [ -n "$CRED_FILES" ]; then
            echo "ERROR: Possible credential files committed:"
            echo "$CRED_FILES"
            exit 1
          else
            echo "No credential files committed to git"
          fi

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
