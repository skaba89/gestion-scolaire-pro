name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ===========================================================
  # JOB 0: Supabase Lint
  # ===========================================================
  supabase-lint:
    name: Supabase SQL Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Lint SQL migrations
        run: supabase db lint

  # ===========================================================
  # JOB 1: Lint, Type Check, Test, Build
  # ===========================================================
  lint-and-test:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ESLint is non-blocking — warnings are acceptable
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      # TypeScript type-check is blocking — type errors must be fixed
      - name: Run TypeScript type check
        run: npm run type-check

      - name: Run Vitest
        run: npm run test:ci || true
        continue-on-error: true

      - name: Generate coverage report
        run: npm run test:coverage || true
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false
          verbose: true

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.node-version }}
          path: dist/
          retention-days: 7

  # ===========================================================
  # JOB 2: Backend Tests (Python / FastAPI)
  # ===========================================================
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      SECRET_KEY: test-secret-key-for-ci-only-32chars-long
      DEBUG: "True"
      KEYCLOAK_URL: http://localhost:8080
      KEYCLOAK_REALM: test
      KEYCLOAK_CLIENT_ID: test-client
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=term
      - name: Upload backend coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ===========================================================
  # JOB 3: Docker Build Validation
  # ===========================================================
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [lint-and-test, backend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Copy env file
        run: cp .env.docker.example .env.docker
      - name: Validate docker-compose config
        run: docker compose --env-file .env.docker config
      - name: Build frontend image
        run: docker build -t schoolflow-frontend:test .
      - name: Build backend image
        run: docker build -t schoolflow-backend:test ./backend

  # ===========================================================
  # JOB 4: Security Scanning (OPTIONAL)
  # ===========================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

  # ===========================================================
  # JOB 5: Deploy to Staging (Only on develop branch)
  # ===========================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint-and-test, backend-tests]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.STAGING_SUPABASE_KEY }}

      - name: Deploy to Vercel (Staging)
        uses: vercel/action@master
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}

      - name: Notify Slack (Staging)
        uses: slackapi/slack-github-action@v2
        if: success()
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Deployed to Staging",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment Successful*\nBranch: `develop`\nCommit: `${{ github.sha }}`"
                  }
                }
              ]
            }

  # ===========================================================
  # JOB 6: Deploy to Production (Only on main branch)
  # ===========================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-and-test, backend-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://schoolflow.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PROD_SUPABASE_KEY }}

      - name: Deploy to Vercel (Production)
        uses: vercel/action@master
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PROD }}

      - name: Notify Slack (Production)
        uses: slackapi/slack-github-action@v2
        if: success()
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Production Deployment Complete",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment Successful*\nBranch: `main`\nCommit: `${{ github.sha }}`\nURL: https://schoolflow.example.com"
                  }
                }
              ]
            }

      - name: Alert on Failure
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Production Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment Failed*\nBranch: `main`\nCommit: `${{ github.sha }}`\nCheck: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

  # ===========================================================
  # JOB 7: Performance Monitoring
  # ===========================================================
  performance:
    name: Performance Check
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and analyze bundle
        run: |
          npm run build
          npx webpack-bundle-analyzer dist/assets/*.js || true

      - name: Check bundle size
        run: |
          SIZE=$(du -s dist | cut -f1)
          echo "Bundle size: ${SIZE}KB"
          if [ $SIZE -gt 500000 ]; then
            echo "Warning: Bundle size exceeds 500MB threshold"
            exit 1
          fi

  # ===========================================================
  # JOB 8: Code Quality (Optional)
  # ===========================================================
  quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run SonarQube scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true
